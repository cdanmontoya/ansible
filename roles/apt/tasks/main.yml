---
- name: Update 
  apt:
    update_cache: yes
    upgrade: yes

- name: Install Snap
  apt:
    name: snapd
    state: latest

- name: Install net-tools
  apt:
    name: net-tools
    state: latest
    
- name: Install dconf-tools
  apt:
    name: dconf-tools
    state: latest

- name: Install OpenJDK 8
  apt:
    name: openjdk-8-jdk
    state: latest

- name: Install Git
  apt: 
    name: git
    state: latest

- name: python
  apt: 
    name: python 
    state: latest

- name: Install pip
  apt: 
    name: python-pip
    state: latest

- name: Install pip3
  apt: 
    name: python3-pip
    state: latest

- name: Install MySQL Workbench
  apt:
    name: mysql-workbench
    state: latest

- name: Install tree
  apt:
    name: tree
    state: latest

- name: Install htop
  apt:
    name: htop
    state: latest

- name: Install VLC
  apt:
    name: vlc
    state: latest